<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Coin Toss Predictor</title>
</head>

<body style="font-family:Arial;text-align:center;padding:40px">

<h2>⚽ Coin Toss Predictor</h2>

<input id="match" placeholder="Netherlands vs Japan" style="padding:10px;width:80%">

<br><br>

<button onclick="predict()" style="padding:10px 20px">Predict</button>

<p id="out"></p>

<script>

const db = {
  "Netherlands": 0.7,
  "Japan": -0.8,
  "Brazil": 1.0,
  "France": 0.9,
  "Germany": 0.6
};

function predict(){
  let input = document.getElementById("match").value;
  let [A,B] = input.split("vs");

  if(!B){
    document.getElementById("out").innerHTML = "格式错误：A vs B";
    return;
  }

  A = A.trim();
  B = B.trim();

  let pA = Math.exp(db[A]||0) / (Math.exp(db[A]||0)+Math.exp(db[B]||0));

  let result = "";

  if(pA > 0.55){
    result = A + " 更可能选开球";
  }else if(pA < 0.45){
    result = B + " 更可能选开球";
  }else{
    result = "五五开";
  }

  document.getElementById("out").innerHTML =
    "A概率: " + pA.toFixed(2) +
    "<br>B概率: " + (1-pA).toFixed(2) +
    "<br><br><b>" + result + "</b>";
}

</script>

</body>
</html>
