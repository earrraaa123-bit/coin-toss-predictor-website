<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup Kickoff Predictor</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #141b34;
      --soft: #1d2748;
      --text: #f5f7ff;
      --muted: #aeb8d8;
      --accent: #7dd3fc;
      --good: #86efac;
      --warn: #fde68a;
      --bad: #fca5a5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1c2750 0%, var(--bg) 55%);
      color: var(--text);
      padding: 18px;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 26px;
      margin: 8px 0 6px;
      text-align: center;
    }

    .sub {
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .card {
      background: rgba(20, 27, 52, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    select, button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 16px;
    }

    select {
      background: var(--soft);
      color: var(--text);
      margin-bottom: 12px;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: white;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }

    button:active {
      transform: scale(0.99);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 760px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .result-main {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .prob {
      font-size: 40px;
      font-weight: 900;
      text-align: center;
      margin: 12px 0;
    }

    .bar {
      height: 16px;
      background: #0f172a;
      border-radius: 999px;
      overflow: hidden;
      margin: 12px 0;
    }

    .bar-inner {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #38bdf8, #86efac);
      transition: width .3s ease;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .team-box {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
    }

    .team-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(125, 211, 252, .15);
      color: var(--accent);
      font-size: 12px;
      margin-right: 5px;
      margin-top: 5px;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 18px;
    }
  </style>
</head>

<body>
<div class="app">
  <h1>⚽ World Cup Kickoff Predictor</h1>
  <div class="sub">Based on your 48-team real coin toss / kickoff database</div>

  <div class="card grid">
    <div>
      <label>Team A</label>
      <select id="teamA"></select>

      <label>Team A captain / coin-toss player</label>
      <select id="captainA"></select>
    </div>

    <div>
      <label>Team B</label>
      <select id="teamB"></select>

      <label>Team B captain / coin-toss player</label>
      <select id="captainB"></select>
    </div>
  </div>

  <div class="card">
    <button onclick="predict()">Predict Kickoff</button>
  </div>

  <div class="card" id="result" style="display:none;">
    <div class="result-main" id="winnerText"></div>
    <div class="prob" id="probText"></div>

    <div class="bar">
      <div class="bar-inner" id="barInner"></div>
    </div>

    <div class="small" id="detailText"></div>

    <div class="grid">
      <div class="team-box">
        <div class="team-title" id="boxA"></div>
        <div class="small" id="infoA"></div>
      </div>

      <div class="team-box">

        <div class="small" id="infoB"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    v1.0 · 48 teams completed · Captain selector included

</div>

function clamp(x) {
  return Math.max(0.02, Math.min(0.98, x));
}

function getTeamNames() {
  return Object.keys(TEAMS).sort();
}

function fillTeams() {
  const names = getTeamNames();
  const teamA = document.getElementById("teamA");
  const teamB = document.getElementById("teamB");

  teamA.innerHTML = "";
  teamB.innerHTML = "";

  names.forEach(name => {
    const optA = document.createElement("option");
    optA.value = name;
    optA.textContent = `${TEAMS[name].flag} ${name}`;
    teamA.appendChild(optA);

    const optB = document.createElement("option");
    optB.value = name;
    optB.textContent = `${TEAMS[name].flag} ${name}`;
    teamB.appendChild(optB);
  });

  teamA.value = "Mexico";
  teamB.value = "South Africa";

  updateCaptains("A");
  updateCaptains("B");
}

function updateCaptains(side) {
  const teamName = document.getElementById("team" + side).value;
  const captainSelect = document.getElementById("captain" + side);
  const team = TEAMS[teamName];

  captainSelect.innerHTML = "";

  const unknown = document.createElement("option");
  unknown.value = "unknown";
  unknown.textContent = "Unknown captain / use team average";
  captainSelect.appendChild(unknown);

  Object.entries(team.captains || {}).forEach(([num, c]) => {
    const opt = document.createElement("option");
    opt.value = num;
    opt.textContent = c.label || `${num}号`;
    captainSelect.appendChild(opt);
  });
}

function adjustedKickoffRate(teamName, captainNum) {
  const team = TEAMS[teamName];
  let base = team.kickoffRate;

  if (!captainNum || captainNum === "unknown") {
    return clamp(base);
  }

  const captain = team.captains?.[captainNum];
  if (!captain || captain.n <= 0) {
    return clamp(base);
  }

  const sampleWeight = Math.min(0.78, captain.n / 10);
  const adjusted = base * (1 - sampleWeight) + captain.kickoff * sampleWeight;

  return clamp(adjusted);
}

function confidenceMultiplier(teamName, captainNum) {
  const team = TEAMS[teamName];
  let base = 1;

  if (team.confidence.includes("S")) base = 1.08;
  else if (team.confidence.includes("A")) base = 1.04;
  else if (team.confidence.includes("B")) base = 1.00;
  else base = 0.94;

  if (captainNum && captainNum !== "unknown") {
    const cap = team.captains?.[captainNum];
    if (cap && cap.n >= 3) base += 0.03;
    if (cap && cap.n <= 1) base -= 0.02;
  }

  return base;
}

function predict() {
  const a = document.getElementById("teamA").value;
  const b = document.getElementById("teamB").value;
  const ca = document.getElementById("captainA").value;
  const cb = document.getElementById("captainB").value;

  if (a === b) {
    alert("Please choose two different teams.");
    return;
  }

  const aKickIfWins = adjustedKickoffRate(a, ca);
  const bKickIfWins = adjustedKickoffRate(b, cb);

  // Conservative coin toss model:
  // 50% Team A wins coin, 50% Team B wins coin.
  // If A wins and chooses kickoff => A kicks.
  // If B wins and chooses side => A kicks.
  let pA = 0.5 * aKickIfWins + 0.5 * (1 - bKickIfWins);

  const cmA = confidenceMultiplier(a, ca);
  const cmB = confidenceMultiplier(b, cb);

  // tiny confidence adjustment, not changing logic too much
  const lean = (cmA - cmB) * 0.015;
  pA = clamp(pA + lean);

  const pB = 1 - pA;

  const winner = pA >= pB ? a : b;
  const winnerProb = Math.max(pA, pB);
  const teamA = TEAMS[a];
  const teamB = TEAMS[b];

  document.getElementById("result").style.display = "block";
  document.getElementById("winnerText").textContent =
    `${TEAMS[winner].flag} ${winner} is more likely to kick off`;

  document.getElementById("probText").textContent =
    `${Math.round(winnerProb * 100)}%`;

  document.getElementById("barInner").style.width =
    `${Math.round(pA * 100)}%`;

  document.getElementById("detailText").innerHTML = `
    ${teamA.flag} ${a} kickoff probability: <b>${Math.round(pA * 100)}%</b><br>
    ${teamB.flag} ${b} kickoff probability: <b>${Math.round(pB * 100)}%</b><br><br>
    Model logic: if a team wins the toss and chooses kickoff, it kicks off.
    If it chooses side/field, the opponent kicks off.
  `;

  document.getElementById("boxA").textContent = `${teamA.flag} ${a}`;
  document.getElementById("boxB").textContent = `${teamB.flag} ${b}`;

  document.getElementById("infoA").innerHTML = teamInfo(a, ca, aKickIfWins);
  document.getElementById("infoB").innerHTML = teamInfo(b, cb, bKickIfWins);
}

function teamInfo(teamName, captainNum, adjustedRate) {
  const t = TEAMS[teamName];
  const cap = captainNum === "unknown" ? null : t.captains?.[captainNum];

  return `
    <span class="tag">Confidence: ${t.confidence}</span>
    <span class="tag">${t.style}</span><br><br>
    Team kickoff tendency if winning toss: <b>${Math.round(t.kickoffRate * 100)}%</b><br>
    Adjusted with captain: <b>${Math.round(adjustedRate * 100)}%</b><br>
    Captain: <b>${cap ? cap.label : "Unknown / team average"}</b><br><br>
    ${t.note}
  `;
}

document.getElementById("teamA").addEventListener("change", () => updateCaptains("A"));
document.getElementById("teamB").addEventListener("change", () => updateCaptains("B"));

fillTeams();
predict();
