////////////////////////////////////////////////////
// 2. 开球倾向
////////////////////////////////////////////////////
const tossBias = {
  Germany:0.51,France:0.50,England:0.49,Spain:0.48,Portugal:0.52,
  Italy:0.50,Netherlands:0.54,Belgium:0.50,Croatia:0.53,Switzerland:0.50,

  Nigeria:0.60,"Côte d'Ivoire":0.59,

  Japan:0.56,"South Korea":0.55,Iran:0.57,"Saudi Arabia":0.60,Qatar:0.58,Australia:0.56,

////////////////////////////////////////////////////
// 3. 风格模型
////////////////////////////////////////////////////
const styleMap = {
  Germany:"possession",France:"balanced",England:"balanced",Spain:"possession",
  Portugal:"balanced",Italy:"defensive",Netherlands:"possession",Belgium:"balanced",

  Croatia:"balanced",Switzerland:"defensive",Austria:"counter",Denmark:"balanced",
  Norway:"counter",Sweden:"balanced",Poland:"counter",Serbia:"counter",

  Brazil:"attacking",Argentina:"attacking",Uruguay:"counter",Colombia:"attacking",
  Ecuador:"counter",Paraguay:"defensive",Peru:"counter",

  Morocco:"defensive",Senegal:"physical",Tunisia:"defensive",Algeria:"attacking",
  Egypt:"attacking",Cameroon:"physical",Ghana:"physical",Nigeria:"attacking",
  "Côte d'Ivoire":"balanced",

  Japan:"possession","South Korea":"pressing",Iran:"defensive",
  "Saudi Arabia":"defensive",Qatar:"possession",Australia:"counter",
  Iraq:"defensive","United Arab Emirates":"balanced",

  "United States":"pressing",Canada:"pressing",Mexico:"attacking",
  "Costa Rica":"defensive",Panama:"counter",Jamaica:"physical",

  "New Zealand":"defensive",Iceland:"balanced"
};

////////////////////////////////////////////////////
// 4. 初始化
////////////////////////////////////////////////////
let selectA=document.getElementById("teamA");
let selectB=document.getElementById("teamB");

for(let t in db){
  let a=document.createElement("option");
  let b=document.createElement("option");
  a.value=b.value=t;
  a.innerText=b.innerText=t;
  selectA.appendChild(a);
  selectB.appendChild(b);
}

////////////////////////////////////////////////////
// 5. 模型函数
////////////////////////////////////////////////////
function calcScore(t){
  let x=db[t];
  return x.base*0.4 + x.captain*0.25 + x.style*0.2 + x.possession*0.15;
}

function styleBias(t){
  let s=styleMap[t]||"balanced";
  if(s==="attacking") return 0.03;
  if(s==="pressing") return 0.04;
  if(s==="counter") return 0.02;
  if(s==="possession") return -0.03;
  if(s==="defensive") return 0.05;
  return 0;
}

function calcToss(t){
  let base=tossBias[t]||0.5;
  let x=db[t];
  return base*0.6 + x.captain*0.2 + (1-x.possession)*0.05 + styleBias(t);
}

function softmax(a,b){
  let ea=Math.exp(a);
  let eb=Math.exp(b);
  let s=ea+eb;
  return {A:ea/s,B:eb/s};
}

////////////////////////////////////////////////////
// 6. 预测
////////////////////////////////////////////////////
function predict(){
  let A=selectA.value;
  let B=selectB.value;

  let a=calcScore(A)+calcToss(A);
  let b=calcScore(B)+calcToss(B);

  let p=softmax(a,b);

  document.getElementById("out").innerHTML=
    A+": "+(p.A*100).toFixed(1)+"%<br>"+
    B+": "+(p.B*100).toFixed(1)+"%<br><br>"+
    "⚽ "+(p.A>p.B?A:B)+" 更可能选开球";
}
