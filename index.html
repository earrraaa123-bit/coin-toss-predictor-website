<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kick-off Predictor v6 (Real Data Structure)</title>
</head>

<body style="font-family:Arial;text-align:center;padding:30px">

<h2>⚽ Kick-off Predictor v6 (Real Data Framework)</h2>

<select id="teamA"></select>
VS
<select id="teamB"></select>

<br><br>

<button onclick="predict()" style="padding:10px 20px">
Predict Kick-off
</button>

<p id="out"></p>

<script>

////////////////////////////////////////////////////
// 1. 48队
////////////////////////////////////////////////////
const teams = [
"Mexico","South Africa","Korea Republic","Czechia",
"Canada","Bosnia and Herzegovina","Switzerland","Qatar",
"Brazil","Scotland","Morocco","Haiti",
"United States","Turkey","Australia","Paraguay",
"Germany","Côte d'Ivoire","Ecuador","Curaçao",
"Netherlands","Sweden","Tunisia","Japan",
"Belgium","Egypt","Iran","New Zealand",
"Spain","Cabo Verde","Saudi Arabia","Uruguay",
"France","Senegal","Iraq","Norway",
"Argentina","Algeria","Austria","Jordan",
"Portugal","DR Congo","Uzbekistan","Colombia",
"England","Croatia","Ghana","Panama"
];

////////////////////////////////////////////////////
// 2. 🌍【真实数据入口层】（以后可替换成CSV）
////////////////////////////////////////////////////

const realData = {

  // 这里不是“概率”，而是“统计频率”
  kickoffRate: {
    // ⚠️ 示例结构（未来可替换真实FIFA统计）
    "Europe": 0.50,
    "SouthAmerica": 0.53,
    "Africa": 0.55,
    "Asia": 0.52,
    "NorthAmerica": 0.51,
    "Oceania": 0.50
  },

  // 主队/客队倾向（现实规则影响）
  homeBias: 0.03
};

////////////////////////////////////////////////////
// 3. 🌍 区域映射（真实地理分组）
////////////////////////////////////////////////////
const region = {

  Mexico:"NorthAmerica", Canada:"NorthAmerica", "United States":"NorthAmerica",
  Panama:"NorthAmerica", Jamaica:"NorthAmerica",

  Brazil:"SouthAmerica", Argentina:"SouthAmerica", Uruguay:"SouthAmerica",
  Colombia:"SouthAmerica", Ecuador:"SouthAmerica", Paraguay:"SouthAmerica",

  Germany:"Europe", France:"Europe", England:"Europe", Spain:"Europe",
  Portugal:"Europe", Italy:"Europe", Netherlands:"Europe", Belgium:"Europe",
  Croatia:"Europe", Switzerland:"Europe", Austria:"Europe", Sweden:"Europe",
  Norway:"Europe", Denmark:"Europe",

  Morocco:"Africa", Senegal:"Africa", Egypt:"Africa", Ghana:"Africa",
  Nigeria:"Africa", Cameroon:"Africa", Tunisia:"Africa", Algeria:"Africa",
  "Côte d'Ivoire":"Africa",

  Japan:"Asia", "Korea Republic":"Asia", Iran:"Asia",
  "Saudi Arabia":"Asia", Qatar:"Asia", Australia:"Asia",
  Iraq:"Asia",

  "New Zealand":"Oceania"
};

////////////////////////////////////////////////////
// 4. ⚽ 球队风格（行为数据层）
////////////////////////////////////////////////////
const styleList = ["attacking","balanced","defensive","possession","counter"];

const styleMap = {};

function hash(str){
  let h=0;
  for(let i=0;i<str.length;i++){
    h=(h*31+str.charCodeAt(i))%1000;
  }
  return h/1000;
}

teams.forEach(t=>{
  styleMap[t]=styleList[Math.floor(hash(t)*styleList.length)];
});

////////////////////////////////////////////////////
// 5. 👑 队长风格（行为补充层）
////////////////////////////////////////////////////
const captainMap = {};

const captainTypes = ["aggressive","calm","tactical"];

teams.forEach(t=>{
  captainMap[t]=captainTypes[Math.floor(hash(t+"cap")*3)];
});

////////////////////////////////////////////////////
// 6. 🧠 数据读取函数（真实数据入口）
////////////////////////////////////////////////////
function getRegion(team){
  return region[team] || "Europe";
}

function getBaseKickoff(team){
  let r = getRegion(team);
  return realData.kickoffRate[r] || 0.5;
}

function styleEffect(team){
  let s = styleMap[team];
  if(s==="attacking") return 0.02;
  if(s==="counter") return 0.01;
  if(s==="possession") return -0.02;
  if(s==="defensive") return 0.03;
  return 0;
}

function captainEffect(team){
  let c = captainMap[team];
  if(c==="aggressive") return 0.03;
  if(c==="tactical") return 0.01;
  if(c==="calm") return -0.01;
  return 0;
}

////////////////////////////////////////////////////
// 7. UI
////////////////////////////////////////////////////
let A=document.getElementById("teamA");
let B=document.getElementById("teamB");

teams.forEach(t=>{
  let o1=document.createElement("option");
  let o2=document.createElement("option");
  o1.value=o2.value=t;
  o1.innerText=o2.innerText=t;
  A.appendChild(o1);
  B.appendChild(o2);
});

////////////////////////////////////////////////////
// 8. softmax
////////////////////////////////////////////////////
function softmax(a,b){
  let ea=Math.exp(a);
  let eb=Math.exp(b);
  let s=ea+eb;
  return {A:ea/s,B:eb/s};
}

////////////////////////////////////////////////////
// 9. 🧠 最终模型（真实数据结构版）
////////////////////////////////////////////////////
function predict(){

  let tA=A.value;
  let tB=B.value;

  let scoreA =
    getBaseKickoff(tA) +
    styleEffect(tA) +
    captainEffect(tA) +
    Math.random()*0.01;

  let scoreB =
    getBaseKickoff(tB) +
    styleEffect(tB) +
    captainEffect(tB) +
    Math.random()*0.01;

  let p = softmax(scoreA,scoreB);

  document.getElementById("out").innerHTML=
    tA+": "+(p.A*100).toFixed(1)+"%<br>"+
    tB+": "+(p.B*100).toFixed(1)+"%<br><br>"+
    "⚽ 更可能开球: "+(p.A>p.B?tA:tB);
}

</script>

</body>
</html>
