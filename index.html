<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Coin Toss Predictor</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
</head>

<body style="font-family:Arial;text-align:center;padding:40px">

<h2>⚽ Coin Toss Predictor App</h2>

<select id="teamA">
  <option>Sweden</option>
  <option>Tunisia</option>
  <option>Netherlands</option>
  <option>Japan</option>
  <option>Brazil</option>
  <option>France</option>
  <option>Germany</option>
</select>

VS

<select id="teamB">
  <option>Sweden</option>
  <option>Tunisia</option>
  <option>Netherlands</option>
  <option>Japan</option>
  <option>Brazil</option>
  <option>France</option>
  <option>Germany</option>
</select>

<br><br>

<button onclick="predict()" style="padding:10px 20px">
Predict
</button>

<p id="out"></p>

<script>

/* =========================
   1. 多因素数据库
========================= */
const db = {
  "Sweden": { base: 0.2, captain: 0.6, style: 0.5, possession: 0.55 },
  "Tunisia": { base: -0.1, captain: 0.4, style: 0.4, possession: 0.45 },
  "Netherlands": { base: 0.3, captain: 0.65, style: 0.7, possession: 0.75 },
  "Japan": { base: -0.15, captain: 0.5, style: 0.65, possession: 0.7 },
  "Brazil": { base: 0.6, captain: 0.7, style: 0.85, possession: 0.8 },
  "France": { base: 0.5, captain: 0.68, style: 0.8, possession: 0.78 },
  "Germany": { base: 0.35, captain: 0.6, style: 0.75, possession: 0.8 }
};

/* =========================
   2. 评分函数
========================= */
function calcScore(team){
  let t = db[team];

  return (
    t.base * 0.4 +
    t.captain * 0.25 +
    t.style * 0.2 +
    t.possession * 0.15
  );
}

/* =========================
   3. softmax -> 概率
========================= */
function softmax(a, b){
  let ea = Math.exp(a);
  let eb = Math.exp(b);

  let sum = ea + eb;

  return {
    A: ea / sum,
    B: eb / sum
  };
}

/* =========================
   4. 预测主函数
========================= */
function predict(){

  let A = document.getElementById("teamA").value;
  let B = document.getElementById("teamB").value;

  let scoreA = calcScore(A);
  let scoreB = calcScore(B);

  // 🔥 稳定扰动（很小，避免乱跳）
  scoreA += (Math.random() - 0.5) * 0.05;
  scoreB += (Math.random() - 0.5) * 0.05;

  let p = softmax(scoreA, scoreB);

  let result =
    p.A > p.B
      ? A + " 更可能选开球"
      : B + " 更可能选开球";

  document.getElementById("out").innerHTML =
    "📊 " + A + ": " + (p.A * 100).toFixed(1) + "%" +
    "<br>📊 " + B + ": " + (p.B * 100).toFixed(1) + "%" +
    "<br><br><b>⚽ " + result + "</b>";
}

/* =========================
   5. PWA注册
========================= */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
